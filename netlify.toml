# example netlify.toml
[build]
  command = "npm run build"
  publish = "dist"

  ## (optional) Settings for Netlify Dev
  ## https://github.com/netlify/cli/blob/main/docs/netlify-dev.md#project-detection
[dev]
  command = "npm run dev"
  targetPort = 3000
  framework = "vite"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Use ESM output format for functions
  [functions.node_bundler_config]
    format = "esm"

# Data sources:
# - Master game indexes: Netlify Blobs (managed by fensterchess.tooling)
# - Opening transitions: GitHub raw (JeffML/eco.json/fromToPositionIndexed.json)
# - Position scores: GitHub raw (JeffML/eco.json/scores.json)

  ## [functions."courses"] 
  ##  included_files = ["dataForLambdas/courseHtml/**/*.html"]

  ## Uncomment to use this redirect for Single Page Applications like create-react-app.
  ## Not needed for static site generators.
  #[[redirects]]
  #  from = "/*"
  #  to = "/index.html"
  #  status = 200

  ## more info on configuring this file: https://www.netlify.com/docs/netlify-toml-reference/

# Don't cache HTML - always fetch fresh so content-hashed asset filenames stay in sync
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache hashed assets forever (filenames change on each build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
